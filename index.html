<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Cooperadoras — Consejo Escolar La Matanza</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<!-- SheetJS para exportar a Excel -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{font-family:'DM Sans',sans-serif;background:#F0F2F5;color:#0F1B35;min-height:100vh;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:inherit;color:inherit}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#C9D0DC;border-radius:9px}

/* ── TOKENS (Modo claro) ── */
:root{
  --navy:#0D2F6E;--navy2:#1848A8;--navy3:#EEF3FC;
  --green:#1E5C2B;--green2:#E6F4EA;
  --red:#8B1A1A;--red2:#FDEAEA;
  --amber:#7A4A00;--amber2:#FEF6E4;
  --border:#DDE3EE;--border2:#C4CEDF;
  --text:#0F1B35;--text2:#3D4F6E;--muted:#6B7B96;
  --surface:#FFFFFF;--bg:#F0F2F5;--bg2:#F7F8FB;
  --shadow:0 1px 3px rgba(15,27,53,.08),0 4px 16px rgba(15,27,53,.06);
  --shadow2:0 8px 32px rgba(15,27,53,.12);
  --shadow3:0 12px 48px rgba(15,27,53,.15);
  --r:10px;--rs:6px;
  --sw:240px;
  --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ── TOKENS (Modo oscuro) ── */
body.dark{
  --navy:#1E3A8A;--navy2:#3B5DB9;--navy3:#1E293B;
  --green:#2E7D32;--green2:#1B3B1F;
  --red:#B91C1C;--red2:#3B1A1A;
  --amber:#D97706;--amber2:#3B2A1A;
  --border:#334155;--border2:#475569;
  --text:#E2E8F0;--text2:#94A3B8;--muted:#64748B;
  --surface:#1E293B;--bg:#0F172A;--bg2:#1E293B;
  --shadow:0 1px 3px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.2);
  --shadow2:0 8px 32px rgba(0,0,0,.4);
}

/* Resto de estilos (similar al original, con mejoras para modo oscuro) */
.screen{display:none;min-height:100vh}
.screen.active{display:flex}

/* ════════════════════════════════════════════════════════════
   MEJORAS: Dashboard y estadísticas
══════════════════════════════════ */
.dashboard-stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 1rem;
  margin-bottom: 1.5rem;
}
.dash-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 1rem;
  transition: var(--transition);
  cursor: pointer;
}
.dash-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow2);
}
.dash-card .value {
  font-size: 2rem;
  font-weight: 800;
  color: var(--navy);
  line-height: 1.2;
}
.dash-card .label {
  font-size: .7rem;
  text-transform: uppercase;
  letter-spacing: .05em;
  color: var(--muted);
  margin-top: .25rem;
}
.dash-card .trend {
  font-size: .7rem;
  margin-top: .5rem;
  display: flex;
  align-items: center;
  gap: .25rem;
}
.trend-up { color: var(--green); }
.trend-down { color: var(--red); }

.chart-container {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 1rem;
  margin-top: 1rem;
}
.chart-title {
  font-size: .8rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .05em;
  color: var(--muted);
  margin-bottom: 1rem;
}
canvas {
  max-height: 200px;
  width: 100%;
}

/* Tooltips */
[data-tooltip] {
  position: relative;
  cursor: help;
}
[data-tooltip]:before {
  content: attr(data-tooltip);
  position: absolute;
  bottom: 100%;
  left: 50%;
  transform: translateX(-50%) translateY(-8px);
  background: var(--navy);
  color: white;
  padding: .25rem .5rem;
  border-radius: 4px;
  font-size: .7rem;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
  z-index: 1000;
}
[data-tooltip]:hover:before {
  opacity: 1;
  transform: translateX(-50%) translateY(-12px);
}

/* Keyboard shortcut hint */
.kbd-hint {
  position: fixed;
  bottom: 1rem;
  right: 1rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 99px;
  padding: .25rem .75rem;
  font-size: .7rem;
  font-family: monospace;
  color: var(--muted);
  pointer-events: none;
  z-index: 100;
}
.dark .kbd-hint {
  background: var(--bg2);
}

/* Loading skeleton */
.skeleton {
  background: linear-gradient(90deg, var(--border) 25%, var(--surface) 50%, var(--border) 75%);
  background-size: 200% 100%;
  animation: loading 1.5s infinite;
  border-radius: var(--rs);
}
@keyframes loading {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* Animaciones mejoradas */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.sc, .ccard, .aitem {
  animation: fadeInUp 0.3s ease-out;
}

/* Responsive mejorado */
@media(max-width: 768px) {
  .dashboard-stats {
    grid-template-columns: repeat(2, 1fr);
    gap: .5rem;
  }
  .dash-card .value {
    font-size: 1.5rem;
  }
}
</style>
</head>
<body>

<!-- ONBOARDING, LOGIN, APP (similar al original, con modificaciones) -->
<!-- ... (mantener estructura similar pero añadir botón de modo oscuro y dashboard) ... -->

<script>
// ============================================================
// MEJORAS ADICIONALES
// ============================================================

// ── MODO OSCURO ────────────────────────────────────────────
function initTheme() {
  const saved = localStorage.getItem('theme');
  if (saved === 'dark') {
    document.body.classList.add('dark');
  }
  // Añadir botón de toggle (se añade dinámicamente)
  addThemeToggle();
}

function addThemeToggle() {
  const sidebar = document.querySelector('.sb-foot');
  if (sidebar && !document.getElementById('theme-toggle')) {
    const btn = document.createElement('button');
    btn.id = 'theme-toggle';
    btn.className = 'sb-user';
    btn.style.marginTop = '0.5rem';
    btn.innerHTML = `
      <div class="u-av">🌓</div>
      <div class="u-info">
        <div class="u-name">Modo oscuro</div>
        <div class="u-role">Alternar tema</div>
      </div>
    `;
    btn.onclick = toggleTheme;
    sidebar.appendChild(btn);
  }
}

function toggleTheme() {
  document.body.classList.toggle('dark');
  localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
  // Forzar re-render de gráficos si hay alguno
  if (window.dashboardChart) {
    renderDashboardStats();
  }
}

// ── DEBOUNCE para búsqueda ─────────────────────────────────
function debounce(func, wait) {
  let timeout;
  return function executedFunction(...args) {
    const later = () => {
      clearTimeout(timeout);
      func(...args);
    };
    clearTimeout(timeout);
    timeout = setTimeout(later, wait);
  };
}

// Aplicar debounce al search
const debouncedRender = debounce(() => renderSchools(), 300);

// ── EXPORTAR A EXCEL ───────────────────────────────────────
function exportToExcel() {
  const list = getPdfList(); // reutilizar filtros actuales
  if (!list.length) {
    toast('⚠ No hay datos para exportar');
    return;
  }
  
  const data = list.map(s => ({
    'Código': s.NUMERO || '',
    'Nombre': s.NOMBRE || '',
    'Localidad': s.LOCALIDAD || '',
    'Dirección': s.DIRECCION || '',
    'Coordinador': getCoord(s.LOCALIDAD),
    'Cordón': getCordLabel(s.LOCALIDAD),
    'Estado': etiq(s).l,
    'Tipo Cooperadora': s.TIPO_COOP || '',
    'Kiosco': s.KIOSCO || '',
    'Banco': s.BANCO === 'con' ? 'Sí' : 'No',
    'Presidenta': s.PRES_NOMBRE || '',
    'Asesora': s.ASESORA_NOMBRE || '',
    'Última Visita': (() => {
      const vs = pj(s.VISITAS, []);
      return vs.length ? vs[vs.length-1].fecha : '';
    })(),
    'Período Activo': s.PERIODO_COOP || '',
    'Documentación': s.DOC_ESTADO || ''
  }));
  
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Cooperadoras');
  
  // Ajustar anchos de columnas
  ws['!cols'] = [{wch:12},{wch:40},{wch:18},{wch:30},{wch:18},{wch:12},{wch:22},{wch:18},{wch:12},{wch:6},{wch:25},{wch:25},{wch:12},{wch:14},{wch:20}];
  
  XLSX.writeFile(wb, `cooperadoras_${new Date().toISOString().slice(0,10)}.xlsx`);
  toast(`📊 Exportadas ${list.length} escuelas a Excel`);
}

// ── BACKUP AUTOMÁTICO ──────────────────────────────────────
function backupData() {
  const backup = {
    timestamp: new Date().toISOString(),
    schools: ST.schools,
    coords: ST.coords,
    users: ST.users
  };
  const blob = new Blob([JSON.stringify(backup, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `backup_cooperadoras_${new Date().toISOString().slice(0,19)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('💾 Backup descargado');
}

// ── VALIDACIONES MEJORADAS ─────────────────────────────────
function validateCUIT(cuit) {
  const clean = cuit.replace(/[^0-9]/g, '');
  if (clean.length !== 11) return false;
  const base = clean.slice(0, 10);
  const provided = parseInt(clean[10]);
  let sum = 0;
  const mult = [5, 4, 3, 2, 7, 6, 5, 4, 3, 2];
  for (let i = 0; i < 10; i++) {
    sum += parseInt(base[i]) * mult[i];
  }
  const remainder = sum % 11;
  const digit = remainder === 0 ? 0 : remainder === 1 ? 9 : 11 - remainder;
  return digit === provided;
}

function validateEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

function validatePhone(phone) {
  const clean = phone.replace(/[^0-9+]/g, '');
  return clean.length >= 8 && clean.length <= 15;
}

// ── DASHBOARD ESTADÍSTICAS ─────────────────────────────────
function renderDashboardStats() {
  const dashContainer = document.getElementById('dashboard-stats');
  if (!dashContainer) return;
  
  if (!ST.schools.length) {
    dashContainer.innerHTML = '<div class="lw"><div class="spinner"></div><p>Cargando estadísticas...</p></div>';
    return;
  }
  
  const total = ST.schools.length;
  const alDia = ST.schools.filter(s => etiq(s).l === 'Cooperadora Al día').length;
  const vigente = ST.schools.filter(s => etiq(s).l === 'Cooperadora Vigente').length;
  const sinActiva = ST.schools.filter(s => etiq(s).l === 'Sin cooperadora activa').length;
  const nuncaTuvo = ST.schools.filter(s => etiq(s).l === 'Nunca tuvo cooperadora').length;
  const conKiosco = ST.schools.filter(s => s.KIOSCO && s.KIOSCO.toLowerCase().includes('kiosco')).length;
  const conBanco = ST.schools.filter(s => s.BANCO === 'con').length;
  
  // Calcular tasa de renovación (escuelas con doc actualizada)
  const conDoc = ST.schools.filter(s => s.DOC_ESTADO && s.DOC_ESTADO !== '').length;
  const tasaRenovacion = total ? Math.round((conDoc / total) * 100) : 0;
  
  dashContainer.innerHTML = `
    <div class="dash-card" onclick="goTo('escuelas');setSF('all')">
      <div class="value">${total}</div>
      <div class="label">Total Escuelas</div>
      <div class="trend"><span>📚</span> Establecimientos</div>
    </div>
    <div class="dash-card" onclick="goTo('escuelas');setSF('aldia')">
      <div class="value" style="color: var(--green)">${alDia}</div>
      <div class="label">Al día</div>
      <div class="trend trend-up">⬆️ +${alDia} documentación OK</div>
    </div>
    <div class="dash-card" onclick="goTo('escuelas');setSF('vigente')">
      <div class="value" style="color: var(--navy2)">${vigente}</div>
      <div class="label">Vigente</div>
      <div class="trend">🟢 En regla</div>
    </div>
    <div class="dash-card" onclick="goTo('escuelas');setSF('sinactiva')">
      <div class="value" style="color: var(--red)">${sinActiva + nuncaTuvo}</div>
      <div class="label">Sin cooperadora</div>
      <div class="trend trend-down">⚠️ Requieren atención</div>
    </div>
    <div class="dash-card">
      <div class="value">${conKiosco}</div>
      <div class="label">Con kiosco</div>
      <div class="trend">🏪 ${Math.round((conKiosco/total)*100)}% del total</div>
    </div>
    <div class="dash-card">
      <div class="value">${tasaRenovacion}%</div>
      <div class="label">Tasa documentación</div>
      <div class="trend ${tasaRenovacion > 50 ? 'trend-up' : 'trend-down'}">${tasaRenovacion > 50 ? '📈' : '📉'} ${tasaRenovacion}% actualizado</div>
    </div>
  `;
  
  // Dibujar gráfico donut
  drawDonutChart(alDia, vigente, sinActiva + nuncaTuvo);
}

function drawDonutChart(aldia, vigente, sinCoop) {
  const canvas = document.getElementById('coop-chart');
  if (!canvas) return;
  
  const ctx = canvas.getContext('2d');
  const total = aldia + vigente + sinCoop;
  if (total === 0) return;
  
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);
  
  const centerX = w / 2;
  const centerY = h / 2;
  const radius = Math.min(w, h) / 2 - 20;
  
  const colors = ['#2E7D32', '#1E3A8A', '#B91C1C'];
  const values = [aldia, vigente, sinCoop];
  let startAngle = -Math.PI / 2;
  
  for (let i = 0; i < values.length; i++) {
    if (values[i] === 0) continue;
    const angle = (values[i] / total) * Math.PI * 2;
    ctx.beginPath();
    ctx.fillStyle = colors[i];
    ctx.moveTo(centerX, centerY);
    ctx.arc(centerX, centerY, radius, startAngle, startAngle + angle);
    ctx.closePath();
    ctx.fill();
    startAngle += angle;
  }
  
  // Círculo interior (efecto donut)
  ctx.beginPath();
  ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--surface').trim();
  ctx.arc(centerX, centerY, radius * 0.6, 0, Math.PI * 2);
  ctx.fill();
  
  // Texto central
  ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--text').trim();
  ctx.font = 'bold 14px "DM Sans"';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(`${total}`, centerX, centerY);
  ctx.font = '10px "DM Sans"';
  ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--muted').trim();
  ctx.fillText('escuelas', centerX, centerY + 14);
}

// ── ATAJOS DE TECLADO ─────────────────────────────────────
function initKeyboardShortcuts() {
  document.addEventListener('keydown', (e) => {
    // Ctrl+K → buscar
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
      e.preventDefault();
      const searchInput = document.getElementById('sc-search');
      if (searchInput) {
        searchInput.focus();
        toast('🔍 Buscar escuela...');
      }
    }
    // Ctrl+N → nueva escuela
    if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
      e.preventDefault();
      if (ST.user && ST.user.role === 'admin') {
        openSM(null);
      } else {
        toast('⚠ Solo administradores');
      }
    }
    // Esc → cerrar modales
    if (e.key === 'Escape') {
      document.querySelectorAll('.moverlay.open').forEach(modal => {
        modal.classList.remove('open');
      });
    }
  });
}

// ── TOAST MEJORADO ────────────────────────────────────────
const originalToast = toast;
window.toast = function(msg, duration = 2800) {
  originalToast(msg);
  // También log para debug
  console.log(`[Toast] ${msg}`);
};

// ── BOTÓN DE EXPORTACIÓN EN PANTALLA ──────────────────────
function addExportButtons() {
  const ph = document.querySelector('#sec-escuelas .ph');
  if (ph && !document.getElementById('excel-btn')) {
    const btnGroup = document.createElement('div');
    btnGroup.style.display = 'flex';
    btnGroup.style.gap = '0.5rem';
    btnGroup.innerHTML = `
      <button class="btn btn-s" onclick="exportToExcel()" id="excel-btn" data-tooltip="Exportar a Excel">📊 Excel</button>
      <button class="btn btn-s" onclick="backupData()" data-tooltip="Backup JSON">💾 Backup</button>
    `;
    ph.appendChild(btnGroup);
  }
}

// ── ACTUALIZAR RENDERIZADO CON DEBOUNCE ───────────────────
// Modificar el evento input del search
function initSearchDebounce() {
  const searchInput = document.getElementById('sc-search');
  if (searchInput) {
    const originalOnInput = searchInput.oninput;
    searchInput.oninput = debouncedRender;
  }
}

// ── TABS MEJORADOS ────────────────────────────────────────
function addDashboardTab() {
  const sidebar = document.querySelector('.sb-nav');
  if (sidebar && !document.getElementById('ni-dashboard')) {
    const dashBtn = document.createElement('button');
    dashBtn.id = 'ni-dashboard';
    dashBtn.className = 'nav-i';
    dashBtn.innerHTML = '<span class="ico">📊</span>Dashboard';
    dashBtn.onclick = () => goTo('dashboard');
    sidebar.insertBefore(dashBtn, sidebar.firstChild);
    
    // También en bottom nav
    const bnav = document.querySelector('.bnav');
    if (bnav) {
      const bDashBtn = document.createElement('button');
      bDashBtn.id = 'bi-dashboard';
      bDashBtn.className = 'bn-i';
      bDashBtn.innerHTML = '<span class="ico">📊</span>Inicio';
      bDashBtn.onclick = () => goTo('dashboard');
      bnav.insertBefore(bDashBtn, bnav.firstChild);
    }
    
    // Crear sección dashboard
    const appContainer = document.querySelector('.content');
    if (appContainer && !document.getElementById('sec-dashboard')) {
      const dashSec = document.createElement('div');
      dashSec.id = 'sec-dashboard';
      dashSec.className = 'sec';
      dashSec.innerHTML = `
        <div class="ph">
          <div><div class="ph-ttl">Dashboard</div><div class="ph-sub">Panorama general de gestión</div></div>
          <button class="btn btn-s" onclick="renderDashboardStats()" data-tooltip="Actualizar">🔄 Actualizar</button>
        </div>
        <div id="dashboard-stats"></div>
        <div class="chart-container">
          <div class="chart-title">Distribución por estado de cooperadora</div>
          <canvas id="coop-chart" width="400" height="200" style="max-width:100%; height:auto"></canvas>
        </div>
        <div class="card card-p" style="margin-top:1rem">
          <div class="fs-ttl">Mapa de calor por localidad</div>
          <div id="localidad-heatmap" style="font-size:.8rem"></div>
        </div>
      `;
      appContainer.insertBefore(dashSec, document.getElementById('sec-escuelas'));
    }
  }
}

function renderHeatmap() {
  const container = document.getElementById('localidad-heatmap');
  if (!container) return;
  
  const locCount = {};
  ST.schools.forEach(s => {
    if (s.LOCALIDAD) {
      locCount[s.LOCALIDAD] = (locCount[s.LOCALIDAD] || 0) + 1;
    }
  });
  
  const maxCount = Math.max(...Object.values(locCount), 1);
  
  container.innerHTML = Object.entries(locCount)
    .sort((a,b) => b[1] - a[1])
    .map(([loc, count]) => {
      const intensity = Math.round((count / maxCount) * 100);
      const color = intensity > 66 ? '#1E5C2B' : intensity > 33 ? '#D97706' : '#8B1A1A';
      return `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:.25rem 0;border-bottom:1px solid var(--border)">
          <span>${loc}</span>
          <div style="display:flex;align-items:center;gap:.5rem">
            <div style="width:100px;height:6px;background:var(--border);border-radius:3px;overflow:hidden">
              <div style="width:${intensity}%;height:100%;background:${color};border-radius:3px"></div>
            </div>
            <span style="font-weight:600;min-width:30px">${count}</span>
          </div>
        </div>
      `;
    }).join('');
}

// Sobrescribir goTo para incluir dashboard
const originalGoTo = window.goTo;
window.goTo = function(name) {
  if (name === 'dashboard') {
    document.querySelectorAll('.sec').forEach(sec => sec.classList.remove('on'));
    document.getElementById('sec-dashboard')?.classList.add('on');
    document.querySelectorAll('.nav-i').forEach(btn => btn.classList.remove('on'));
    document.getElementById('ni-dashboard')?.classList.add('on');
    document.querySelectorAll('.bn-i').forEach(btn => btn.classList.remove('on'));
    document.getElementById('bi-dashboard')?.classList.add('on');
    renderDashboardStats();
    renderHeatmap();
    return;
  }
  originalGoTo(name);
};

// ── INICIALIZACIÓN ────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  initTheme();
  initKeyboardShortcuts();
  initSearchDebounce();
  addDashboardTab();
  addExportButtons();
  
  // Modificar refreshApp para actualizar dashboard
  const originalRefresh = window.refreshApp;
  window.refreshApp = async function() {
    if (originalRefresh) await originalRefresh();
    renderDashboardStats();
    renderHeatmap();
  };
});

// Nota: Mantener el resto del código original, solo añadir estas mejoras
// y asegurar compatibilidad
</script>
</body>
